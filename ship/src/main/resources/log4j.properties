log4j.rootLogger=INFO, stdout
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.Threshold=INFO
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p [logId:%X{logId}] [magic_mirror:ship] [%c{1}:%L] - %m%n

log4j.logger.com.zyc.magic_mirror.ship.dao=DEBUG, f1

log4j.appender.f1=org.apache.log4j.DailyRollingFileAppender
log4j.appender.f1.File=logs/ship.log
log4j.appender.f1.layout=org.apache.log4j.PatternLayout
log4j.appender.f1.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p [logId:%X{logId}] [magic_mirror:ship] [%c{1}:%L] - %m%n

log4j.appender.f1.DatePattern='.'yyyy-MM-dd'.log'
log4j.appender.f1.append=true
