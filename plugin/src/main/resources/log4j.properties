log4j.rootLogger=INFO, f1, stdout
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.Threshold=INFO
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p [logId:%X{logId}] [magic_mirror:plugin] [%c{1}:%L] - %m%n

log4j.logger.com.zyc.magic_mirror.plugin.dao=debug, f1

log4j.appender.f1=org.apache.log4j.DailyRollingFileAppender
log4j.appender.f1.File=logs/plugin.log
log4j.appender.f1.layout=org.apache.log4j.PatternLayout
log4j.appender.f1.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p [logId:%X{logId}] [magic_mirror:plugin] [%c{1}:%L] - %m%n

log4j.appender.f1.DatePattern='.'yyyy-MM-dd'.log'
log4j.appender.f1.append=true
